stages:
  data_ingestion:
    cmd: uv run src/data-ingestion.py
    deps:
    - src/data-ingestion.py
    params:
    - data_ingestion.test_size
    outs:
    - data/raw
  data_preprocessing:
    cmd: uv run src/preprocessing.py
    deps:
    - data/raw
    - src/preprocessing.py
    outs:
    - data/interim
  feature_engineering:
    cmd: uv run src/feature_eng.py
    deps:
    - data/interim
    - src/feature_eng.py
    params:
    - feature_engineering.max_features
    outs:
    - data/processed
  model_building:
    cmd: uv run src/model_building.py
    deps:
    - data/processed
    - src/model_building.py
    params:
    - model_building.n_estimators
    - model_building.random_state
    outs:
    - models/model.pkl
  model_evaluation:
    cmd: uv run src/model_evl.py
    deps:
    - models/model.pkl
    - src/model_evl.py
    metrics:
    - reports/metrics.json
params:
- dvclive/params.yaml
metrics:
- dvclive/metrics.json
plots:
- dvclive/plots/metrics:
    x: step
